TebLocalPlannerROS:
  odom_topic: odom
  map_frame: map

  max_vel_x: 3
  max_vel_x_backwards: 0.5
  max_vel_theta: 2.0
  acc_lim_x: 4.0
  acc_lim_theta: 3.0

  min_in_place_vel_theta: 0.0

  min_turning_radius: 5
  wheelbase: 2.0

  # Two circle model is supposed to be faster
  footprint_model:
      type: "two_circles"
      front_offset: 1.25 # for type "two_circles"
      front_radius: 1.0 # for type "two_circles"
      rear_offset: 1.25 # for type "two_circles"
      rear_radius: 1.0 # for type "two_circles"
      vertices: [[-3.25, -0.8], [-3.25, 0.8], [0.75, 0.8], [0.75, -0.8]]

  # Stopped velocity thresholds
  trans_stopped_vel: 0.1
  theta_stopped_vel: 0.1

  # Goal tolerances
  xy_goal_tolerance: 0.5
  yaw_goal_tolerance: 0.3

  # Trajectory simulation parameters
  teb_autosize: true
  # Temporal resolution of the planned trajectory (usually 1 / control_rate)
  dt_ref: 0.2 
  # Hysteresis for automatic resizing depending on the current temporal resolution, usually approx 10% of dt_ref is recommended
  dt_hysteresis: 0.02
  # This controls how long the local plan is (0 disabled, uses size of local map)
  max_global_plan_lookahead_dist: 6.0 # lower numbers make it drive slower, but are better for getting around tight corners
  feasibility_check_no_poses: 2
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: true
  # min_samples: 3  # Reduce to speed up planning
  max_samples: 6 # Reduce to speed up planning


  occdist_scale: 1.0
  forward_point_distance: 0.325

  # Oscillation prevention
  oscillation_recovery: false
  stop_time_buffer: 0.2
  oscillation_reset_dist: 0.5

  # Optimization parameters
  no_inner_iterations: 3  # Reduce inner iterations to increase performance
  no_outer_iterations: 3  # Reduce outer iterations to increase performance

  # Sample density


  # Additional parameters
  prune_plan: true
  restore_defaults: false

  min_obstacle_dist: 2  # Must be greater than or equal to (inscribed_radius + padding)
  inflation_dist: 2.1  # Slightly larger than min_obstacle_dist for safety

  enable_multithreading: true
  # Restrict the number of alternative trajectories that are subject to optimization. Often 2 alternatives are sufficient (avoid obstacles on the left or right side).
  max_number_classes: 1

  # costmap_obstacles_behind_robot_dist: 0.0
  global_plan_viapoint_sep: 0.1
  # This is important to make sure that car drives at planned velocity in all Cartesian directions, otherwise cmd_vel is calculated backwards
  via_points_ordered: true 
